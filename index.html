<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DEALS</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        /* Banner Slider */
        .slider-container { width: 100%; overflow: hidden; background: #fff; padding: 10px 0; border-bottom: 2px solid #333; }
        .slider { display: flex; animation: slide 15s linear infinite; gap: 15px; }
        @keyframes slide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .card { min-width: 140px; background: #eee; padding: 10px; border-radius: 8px; text-align: center; }
        
        .nav-bar { background: #333; padding: 10px; text-align: center; overflow-x: auto; white-space: nowrap; }
        .nav-bar a { color: white; padding: 10px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .product-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 10px; }
        .product-card { background: white; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
        .btn { display: block; background: #28a745; color: white; padding: 8px; text-decoration: none; border-radius: 5px; margin-top: 5px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <!-- Main Page Sliding Deals -->
    <div class="slider-container">
        <div class="slider" id="main-slider">
            <!-- Deals will be loaded here automatically -->
        </div>
    </div>

    <div class="nav-bar">
        <a href="#" onclick="filterDeals('amazon')">Amazon</a>
        <a href="#" onclick="filterDeals('flipkart')">Flipkart</a>
        <a href="#" onclick="filterDeals('myntra')">Myntra</a>
        <a href="#" onclick="filterDeals('ajio')">Ajio</a>
        <a href="#" onclick="filterDeals('bitli')">Bitli</a>
        <a href="#" onclick="filterDeals('mavigadget')">MaviGadget</a>
        <a href="#" onclick="filterDeals('nikolatoy')">NikolaToy</a>
        <a href="#" onclick="filterDeals('hamaramall')">HamaraMall</a>
    </div>

    <h2 id="page-title" style="text-align:center;">All Deals</h2>
    <div class="product-container" id="product-container"></div>

    <script>
        let allProducts = [];
        fetch('products.json').then(r => r.json()).then(data => { 
            allProducts = data; 
            renderSlider(); 
            renderAll();
        });

        function renderSlider() {
            const slider = document.getElementById('main-slider');
            allProducts.forEach(p => {
                slider.innerHTML += `<div class="card"><b>${p.name}</b><br><small>${p.price}</small></div>`;
            });
        }

        function renderAll() {
            const container = document.getElementById('product-container');
            container.innerHTML = "";
            allProducts.forEach(p => {
                container.innerHTML += `<div class="product-card"><h4>${p.name}</h4><p style="color:red; font-weight:bold;">${p.price}</p><a href="${p.link}" target="_blank" class="btn">Grab Deal</a></div>`;
            });
        }

        function filterDeals(cat) {
            document.getElementById('page-title').innerText = cat.toUpperCase() + " DEALS";
            const container = document.getElementById('product-container');
            container.innerHTML = "";
            allProducts.filter(p => p.category.toLowerCase() === cat.toLowerCase()).forEach(p => {
                container.innerHTML += `<div class="product-card"><h4>${p.name}</h4><p style="color:red; font-weight:bold;">${p.price}</p><a href="${p.link}" target="_blank" class="btn">Grab Deal</a></div>`;
            });
        }
    </script>
</body>
</html>
