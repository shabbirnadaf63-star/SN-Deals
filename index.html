<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Deals | Official Store</title>
    <style>
        body { font-family: sans-serif; background: #f3f3f3; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: center; }
        .btn-buy { display: block; background: #ff9900; padding: 10px; margin-top: 10px; color: white; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="grid" id="product-grid"></div>

<script>
    const products = [
        { name: "Premium Gadget 1", link: "https://link.amazon/B07H74QzY" },
        { name: "Premium Gadget 2", link: "https://link.amazon/B0cTtjMIQ" },
        { name: "Premium Gadget 3", link: "https://link.amazon/B0exj1QWj" }
    ];

    const grid = document.getElementById('product-grid');
    
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <div style="font-size:2.5rem; margin-bottom:10px;">⚡</div>
                <div style="font-size:0.9rem; font-weight:bold;">${p.name}</div>
                <a href="${p.link}" target="_blank" class="btn-buy">Buy Now</a>
            </div>
        `;
    });
</script>

</body>
</html>
