<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Deals - Premium Live Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f1f3f6; }
        /* Header */
        .header { background: #232f3e; color: white; padding: 15px; text-align: center; }
        /* Slider */
        .slider { width: 100%; height: 200px; background: #ddd; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 4px; border: 1px solid #ddd; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .price { color: #b12704; font-weight: bold; font-size: 1.1rem; }
        .btn { display: block; width: 100%; padding: 8px; margin-top: 5px; border: none; cursor: pointer; border-radius: 2px; font-weight: bold; }
        .cart-btn { background: #ff9f00; }
        .buy-btn { background: #fb641b; color: white; }
    </style>
</head>
<body>

<div class="header"><h1>SN Deals | 1000+ Offers Active</h1></div>
<div class="slider"><h2>MEGA MONSOON SALE - Up to 50% OFF</h2></div>

<div class="grid" id="main-grid"></div>

<script>
    const cats = ["Laptop", "Smart TV", "Washing Machine", "Fridge", "Mobile", "Gadgets", "Clothes", "Tools"];
    const grid = document.getElementById('main-grid');

    for (let i = 1; i <= 1000; i++) {
        let cat = cats[i % cats.length];
        let price = Math.floor(Math.random() * 50000) + 2000;
        let disc = Math.floor(Math.random() * 40) + 10;
        
        grid.innerHTML += `
            <div class="card">
                <img src="https://picsum.photos/seed/${i}/300/300" onerror="this.src='https://placehold.co/300x300?text=Premium+Product'">
                <div style="font-size: 0.8rem;">${cat} ${i} - New Model</div>
                <div class="price">₹${price.toLocaleString()} <span style="font-size:0.7rem; color:green">${disc}% OFF</span></div>
                <button class="btn cart-btn" onclick="alert('Added to Cart!')">Add To Cart</button>
                <button class="btn buy-btn">Buy Now</button>
            </div>
        `;
    }
</script>

</body>
</html>
