<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN DEALS - LIVE OFFERS</title>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        .header { background: #232f3e; color: #fff; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section { background: #fff; margin: 10px 0; padding: 15px; }
        .sec-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #333; text-transform: uppercase; }
        
        /* Swiper Slider Styles */
        .swiper { width: 100%; }
        .swiper-slide { 
            width: 140px; 
            border: 1px solid #e0e0e0; 
            border-radius: 10px; 
            padding: 12px; 
            text-align: center; 
            background: #fff; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .card-name { font-size: 13px; height: 35px; overflow: hidden; margin-bottom: 8px; color: #444; }
        .price { color: #b12704; font-weight: bold; margin-bottom: 10px; font-size: 13px; }
        .btn { display: block; background: #ff9900; color: #000; padding: 8px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header"><h1>SN DEALS</h1></div>
    <div id="content"></div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        fetch('products.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('content');
            const categories = [...new Set(data.map(p => p.category))];
            
            categories.forEach(cat => {
                let sectionHTML = `
                    <div class="section">
                        <div class="sec-title">${cat}</div>
                        <div class="swiper mySwiper">
                            <div class="swiper-wrapper">`;
                
                data.filter(p => p.category === cat).forEach(p => {
                    sectionHTML += `
                        <div class="swiper-slide">
                            <div class="card-name">${p.name}</div>
                            <div class="price">${p.price}</div>
                            <a href="${p.link}" target="_blank" class="btn">Grab Deal</a>
                        </div>`;
                });
                
                sectionHTML += `</div></div></div>`;
                container.innerHTML += sectionHTML;
            });

            // Initialize Swiper for all sections
            new Swiper(".mySwiper", {
                slidesPerView: "auto",
                spaceBetween: 10,
                freeMode: true,
            });
        });
    </script>
</body>
</html>
